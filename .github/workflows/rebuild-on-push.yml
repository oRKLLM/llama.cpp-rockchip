name: Rebuild on Push

on:
  push:
    branches:
      - master

permissions:
  actions: write
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Fetch Upstream Tags
        run: |
          git remote add upstream https://github.com/ggerganov/llama.cpp.git
          LATEST_TAGS=$(git ls-remote --tags --sort=-v:refname upstream "refs/tags/b*" | head -n 20 | awk '{print $2}')
          for tag in $LATEST_TAGS; do
            # the awk command returns strings like "refs/tags/b1234"
            # we need to strip "refs/tags/" to get "b1234"
            tag_name=$(echo "$tag" | sed 's/refs\/tags\///')
            git fetch upstream "$tag_name:$tag_name" --force
          done

      - name: Delete Old Releases/Tags and Dispatch
        uses: actions/github-script@v7
        with:
          script: |
            const execSync = require('child_process').execSync;
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            
            // Delete all releases
            try {
              const releases = await github.paginate(github.rest.repos.listReleases, {
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              for (const release of releases) {
                console.log(`Deleting release ${release.tag_name}`);
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                });
              }
            } catch (e) {
              console.error(`Error deleting releases: ${e.message}`);
            }

            // Delete all tags
            try {
              const refs = await github.paginate(github.rest.git.listMatchingRefs, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/',
              });
              for (const ref of refs) {
                console.log(`Deleting tag ${ref.ref}`);
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: ref.ref.replace('refs/', ''),
                });
              }
            } catch (e) {
              console.error(`Error deleting tags: ${e.message}`);
            }
            
            async function dispatch(tag, ourTag) {
              for (let attempt = 0; attempt < 3; attempt++) {
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: 'build-rockchip.yml',
                    ref: 'master',
                    inputs: { upstream_tag: tag, our_tag: ourTag }
                  });
                  return;
                } catch (e) {
                  console.warn(`Dispatch ${ourTag} attempt ${attempt + 1} failed: ${e.message}`);
                  if (attempt < 2) await sleep(5000 * (attempt + 1));
                }
              }
              console.error(`Failed to dispatch ${ourTag} after 3 attempts`);
            }
            
            const getTagsCmd = 'git for-each-ref --sort=-creatordate --format="%(refname:short)" refs/tags/';
            const output = execSync(getTagsCmd).toString().trim().split('\n').filter(Boolean);
            
            const upstreamTags = [];
            for (const tag of output) {
              if (/^b[0-9]+$/.test(tag)) {
                upstreamTags.push(tag);
                if (upstreamTags.length >= 20) break;
              }
            }
            
            console.log(`Latest 20 upstream tags: ${upstreamTags.join(', ')}`);
            
            for (const tag of upstreamTags) {
              const ourTag = `${tag}-ork`;
              console.log(`Dispatching builder for ${ourTag}...`);
              await dispatch(tag, ourTag);
              await sleep(2000);
            }
