name: Rebuild on Push

on:
  push:
    branches:
      - master

permissions:
  actions: write
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-24.04

    steps:
      - name: Calculate Tags and Dispatch
        uses: actions/github-script@v7
        with:
          script: |
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            const twoDaysAgo = new Date(Date.now() - 48 * 60 * 60 * 1000);
            
            console.log("Fetching existing releases to rebuild...");
            const ourReleases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existingTags = ourReleases
              .map(r => r.tag_name.replace(/-ork$/, ''))
              .filter(t => /^b[0-9]+$/.test(t));
              
            console.log("Fetching upstream releases from the last 48 hours...");
            const recentTags = [];
            let page = 1;
            while(true) {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: 'ggerganov',
                repo: 'llama.cpp',
                per_page: 30,
                page: page
              });
              if (releases.length === 0) break;
              let done = false;
              for (const r of releases) {
                if (new Date(r.published_at) < twoDaysAgo) {
                  done = true;
                  break;
                }
                if (/^b[0-9]+$/.test(r.tag_name)) {
                  recentTags.push(r.tag_name);
                }
              }
              if (done) break;
              page++;
            }
            
            const allTagsToRebuild = Array.from(new Set([...existingTags, ...recentTags])).sort((a, b) => {
               // sort descending: b1234, b1233
               return parseInt(b.substring(1)) - parseInt(a.substring(1));
            });
            
            console.log(`Tags to rebuild: ${allTagsToRebuild.join(', ')}`);
            
            // Delete all our releases
            for (const release of ourReleases) {
              console.log(`Deleting release ${release.tag_name}`);
              try {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                });
              } catch (e) {
                console.error(`Error deleting release ${release.tag_name}: ${e.message}`);
              }
            }

            // Delete all our tags
            try {
              const refs = await github.paginate(github.rest.git.listMatchingRefs, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/',
              });
              for (const ref of refs) {
                console.log(`Deleting tag ${ref.ref}`);
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: ref.ref.replace('refs/', ''),
                  });
                } catch (delErr) {
                  console.warn(`Could not delete tag ${ref.ref}: ${delErr.message}`);
                }
              }
            } catch (e) {
              console.error(`Error fetching tags to delete: ${e.message}`);
            }
            
            async function dispatch(tag, ourTag) {
              for (let attempt = 0; attempt < 3; attempt++) {
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: 'build-rockchip.yml',
                    ref: 'master',
                    inputs: { upstream_tag: tag, our_tag: ourTag }
                  });
                  return;
                } catch (e) {
                  console.warn(`Dispatch ${ourTag} attempt ${attempt + 1} failed: ${e.message}`);
                  if (attempt < 2) await sleep(5000 * (attempt + 1));
                }
              }
              console.error(`Failed to dispatch ${ourTag} after 3 attempts`);
            }
            
            for (const tag of allTagsToRebuild) {
              const ourTag = `${tag}-ork`;
              console.log(`Dispatching builder for ${ourTag}...`);
              await dispatch(tag, ourTag);
              await sleep(2000);
            }
