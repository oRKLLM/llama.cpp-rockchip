name: Build and Release NPU Backend

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Upstream tag to build (e.g. b9653)'
        required: true
        type: string
      our_tag:
        description: 'Target tag to push (e.g. b9653-ork)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Clone Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          ref: master

      - name: Setup Git Configuration
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch Upstream
        run: |
          git remote add upstream https://github.com/ggerganov/llama.cpp.git
          git fetch upstream --tags

      - name: Checkout Tag and Apply Patches
        run: |
          UPSTREAM_TAG="${{ inputs.upstream_tag }}"
          OUR_TAG="${{ inputs.our_tag }}"
          
          # Generate a patch of all custom changes on our branch relative to the upstream merge base,
          # explicitly excluding any workflow/action files in the .github directory
          git diff upstream/master...master -- . ':!.github' > npu_changes.patch
          
          # Checkout the upstream tag
          git checkout "tags/$UPSTREAM_TAG"
          
          # Apply the patch containing NPU changes
          git apply npu_changes.patch
          
          # Completely delete the .github directory from this tag commit.
          # Pushing a new tag that contains workflow files requires "workflows" write permission
          # which the default GITHUB_TOKEN is not allowed to have. Since the tag is just a release snapshot,
          # we can safely strip the workflow files to bypass this security restriction.
          git rm -rf .github
          
          # Update submodules at this ref
          git submodule update --init --recursive
          
          # Commit the changes under the new tag
          git add .
          git commit -m "feat: add ggml-ork backend (rebased on $UPSTREAM_TAG)"
          git tag "$OUR_TAG"
          
          # Push the tag to remote
          git push origin "$OUR_TAG"

      - name: Install ARM64 Cross-Compiler and ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y crossbuild-essential-arm64 ccache
          
      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ inputs.upstream_tag }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_ORK=ON \
            -DGGML_CCACHE=ON \
            -DGGML_OPENMP=OFF \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DLLAMA_BUILD_TOOLS=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++

      - name: Build
        run: |
          cmake --build build --config Release -j $(nproc)

      - name: Package Binaries
        run: |
          mkdir release-bin
          cp build/bin/llama-cli release-bin/
          cp build/bin/llama-server release-bin/
          cp -P build/bin/lib*.so* release-bin/
          tar -czvf "llama-cpp-rockchip-npu-${{ inputs.our_tag }}.tar.gz" -C release-bin .

      - name: Generate Release Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_TAG="${{ inputs.upstream_tag }}"
          gh release view "$UPSTREAM_TAG" --repo ggerganov/llama.cpp --json body --jq .body > upstream_body.md 2>/dev/null || echo "No upstream release notes available." > upstream_body.md
          
          echo "Automated release of llama.cpp for Rockchip NPU (\`ggml-ork\`), rebased on upstream version \`$UPSTREAM_TAG\`." > release_body.md
          echo "" >> release_body.md
          echo "Included binaries (ARM64 / Linux):" >> release_body.md
          echo "- \`llama-cli\`" >> release_body.md
          echo "- \`llama-server\`" >> release_body.md
          echo "- \`libllama.so\` and \`libggml*.so\` shared libraries" >> release_body.md
          echo "" >> release_body.md
          echo "### Upstream Release Notes" >> release_body.md
          echo "---" >> release_body.md
          
          cat upstream_body.md >> release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.our_tag }}
          files: llama-cpp-rockchip-npu-*.tar.gz
          draft: false
          prerelease: false
          name: Release ${{ inputs.our_tag }}
          body_path: release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
