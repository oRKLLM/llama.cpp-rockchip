name: Auto-Sync Controller

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  actions: write
  contents: read

jobs:
  check-and-dispatch:
    runs-on: ubuntu-24.04

    steps:
      - name: Clone Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Fetch Upstream Tags
        run: |
          git remote add upstream https://github.com/ggerganov/llama.cpp.git
          LATEST_TAGS=$(git ls-remote --tags --sort=-v:refname upstream "refs/tags/b*" | head -n 10 | awk '{print $2}')
          for tag in $LATEST_TAGS; do
            git fetch upstream "$tag:$tag" --force
          done
          git fetch origin --tags --force

      - name: Find New Tags and Dispatch Builders
        uses: actions/github-script@v7
        with:
          script: |
            const execSync = require('child_process').execSync;
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            
            async function dispatch(tag, ourTag) {
              for (let attempt = 0; attempt < 3; attempt++) {
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: 'build-rockchip.yml',
                    ref: 'master',
                    inputs: { upstream_tag: tag, our_tag: ourTag }
                  });
                  return;
                } catch (e) {
                  console.warn(`Dispatch ${ourTag} attempt ${attempt + 1} failed: ${e.message}`);
                  if (attempt < 2) await sleep(5000 * (attempt + 1));
                }
              }
              console.error(`Failed to dispatch ${ourTag} after 3 attempts — skipping`);
            }
            
            const getTagsCmd = 'git for-each-ref --sort=-creatordate --format="%(refname:short)" refs/tags/';
            const output = execSync(getTagsCmd).toString().trim().split('\n').filter(Boolean);
            
            const upstreamTags = [];
            
            for (const tag of output) {
              if (/^b[0-9]+$/.test(tag)) {
                upstreamTags.push(tag);
                if (upstreamTags.length >= 10) break;
              }
            }
            
            console.log(`Latest 10 upstream tags: ${upstreamTags.join(', ')}`);
            
            for (const tag of upstreamTags) {
              const ourTag = `${tag}-ork`;
              
              let tagExists = false;
              try {
                const result = execSync(`git ls-remote --tags origin refs/tags/${ourTag}`).toString().trim();
                if (result.includes(ourTag)) tagExists = true;
              } catch (e) {}
              
              if (!tagExists) {
                console.log(`New tag detected: ${tag}. Dispatching builder for ${ourTag}...`);
                await dispatch(tag, ourTag);
                await sleep(2000);
              } else {
                let isStale = false;
                try {
                  const upstreamCommit = execSync(`git rev-parse refs/tags/${tag}`).toString().trim();
                  const ourCommit = execSync(`git rev-parse refs/tags/${ourTag}`).toString().trim();
                  execSync(`git merge-base --is-ancestor ${upstreamCommit} ${ourCommit}`);
                } catch (e) {
                  isStale = true;
                }
                
                if (isStale) {
                  console.log(`Tag ${ourTag} is stale (upstream re-released). Dispatching rebuild...`);
                  await dispatch(tag, ourTag);
                  await sleep(2000);
                } else {
                  console.log(`Tag ${ourTag} up-to-date. Skipping.`);
                }
              }
            }
